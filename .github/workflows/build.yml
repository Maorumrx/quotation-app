name: build

# รันเมื่อ push tag เช่น v1.0.0 หรือกดรันเองจากแท็บ Actions
on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: QuotationManager-Windows
          - os: macos-latest
            artifact: QuotationManager-macOS
    runs-on: ${{ matrix.os }}

    # บังคับ Python ให้ใช้ UTF-8 กับ stdio/ไฟล์เสมอ (กัน UnicodeEncodeError จาก
    # ข้อความไทยบน Windows runner ที่ default เป็น cp1252)
    env:
      PYTHONUTF8: "1"
      PYTHONIOENCODING: "utf-8"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build
        run: python build.py

      # ถ้า build ล้ม เอา log จริงไปแปะบนหน้าสรุปของ run เลย (จะได้ไม่ต้องไล่กดหา)
      - name: Show build log on failure
        if: failure()
        shell: bash
        run: |
          echo '### PyInstaller output (Windows/macOS build)' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          tail -n 80 pyinstaller-output.log >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || echo 'no pyinstaller-output.log found' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      # และเก็บ log เต็มไว้ดาวน์โหลดได้ด้วย
      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ matrix.os }}
          path: |
            pyinstaller-output.log
            build/**/warn-*.txt
          if-no-files-found: ignore

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/*
          if-no-files-found: error
